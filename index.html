<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATM Tulsa Tour 2026</title>
<style>
  @font-face{
    font-family:'Proxima Nova';
    src:url('https://interactivefonts.life.church/proximanova-regular-webfont.woff2') format('woff2'),
        url('https://interactivefonts.life.church/proximanova-regular-webfont.woff') format('woff');
    font-weight:400; font-style:normal; font-display:swap;
  }
  @font-face{
    font-family:'Proxima Nova';
    src:url('https://interactivefonts.life.church/proximanova-semibold-webfont.woff2') format('woff2'),
        url('https://interactivefonts.life.church/proximanova-semibold-webfont.woff') format('woff');
    font-weight:600; font-style:normal; font-display:swap;
  }
  @font-face{
    font-family:'Proxima Nova';
    src:url('https://interactivefonts.life.church/proximanova-bold-webfont.woff2') format('woff2'),
        url('https://interactivefonts.life.church/proximanova-bold-webfont.woff') format('woff');
    font-weight:700; font-style:normal; font-display:swap;
  }
  @font-face{
    font-family:'Proxima Nova';
    src:url('https://interactivefonts.life.church/proximanova-black-webfont.woff2') format('woff2'),
        url('https://interactivefonts.life.church/proximanova-black-webfont.woff') format('woff');
    font-weight:900; font-style:normal; font-display:swap;
  }

  :root{
    --bg: #000000;
    --bg-card: #1C1E24;
    --blue: #00A8D8;
    --blue-glow: rgba(0,168,216,0.55);
    --white: #FFFFFF;
    --dim: #E4E6F0;
    --shadow: rgba(0,0,0,0.5);
    --gold: #FFBA0C;
  }

  *{ box-sizing: border-box; }
  html, body{ margin:0; padding:0; }

  body{
    background: var(--bg);
    color: var(--white);
    font-family: 'Proxima Nova', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    padding: 0 0 80px;
    position: relative;
  }

  /* film-grain texture overlay */
  body::before{
    content:"";
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    opacity: 0.05;
    mix-blend-mode: overlay;
    pointer-events: none;
    z-index: 0;
  }

  .preview-banner{
    position: sticky;
    top: 0;
    z-index: 1000;
    background: var(--gold);
    color: #000;
    text-align: center;
    font-family: 'Proxima Nova', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.04em;
    padding: 6px 12px;
  }

  /* ---------- HERO ---------- */
  .hero{
    position: relative;
    padding: 28px 24px 32px;
    text-align: center;
    overflow: hidden;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(255,255,255,0.14), transparent 55%),
      repeating-conic-gradient(from 0deg at 50% -30%, rgba(0,168,216,0.30) 0deg 3deg, transparent 3deg 11deg),
      var(--bg);
  }
  .hero .eyebrow{
    font-family: 'Proxima Nova', sans-serif;
    font-weight: 600;
    color: var(--white);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-size: 13px;
    margin: 0 0 16px;
    position: relative;
    z-index: 1;
  }

  .atm-logo-wrap{
    width: 100%;
    max-width: 560px;
    margin: 0 auto;
    aspect-ratio: 1000 / 425;
    overflow: hidden;
    position: relative;
    z-index: 1;
  }
  .atm-logo{
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 70%;
  }

  .hero-subtitle{
    font-family: 'Proxima Nova', sans-serif;
    font-weight: 900;
    font-size: clamp(26px, 7vw, 40px);
    line-height: 1;
    letter-spacing: 0.01em;
    margin: 18px 0 0;
    color: var(--white);
    -webkit-text-stroke: 1.2px var(--blue);
    text-shadow: 0 0 18px var(--blue-glow), 0 0 6px var(--blue-glow);
  }

  .hero-date{
    margin: 12px 0 0;
    font-family: 'Proxima Nova', sans-serif;
    font-weight: 600;
    font-size: 16px;
    color: var(--white);
    letter-spacing: 0.02em;
  }

  .hero-footnote{
    margin: 14px 0 0;
    color: var(--dim);
    font-size: 12px;
    font-style: italic;
    opacity: 0.75;
  }

  /* ---------- STATUS BAR ---------- */
  .day-banner{
    max-width: 620px;
    margin: 28px auto 0;
    padding: 18px 20px;
    background: var(--bg-card);
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.16);
    position: relative;
    z-index: 1;
  }
  .status{
    text-align: center;
    font-size: 15px;
    color: var(--dim);
    letter-spacing: 0.02em;
  }
  .status strong{ color: var(--white); font-weight: 600; text-shadow: 0 0 10px var(--blue-glow); }

  .countdown{
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px dashed rgba(255,255,255,0.14);
    text-align: center;
    font-family: 'Proxima Nova', sans-serif;
    font-weight: 900;
    font-size: 22px;
    letter-spacing: 0.04em;
    color: var(--white);
    text-shadow: 0 0 12px var(--blue-glow);
    display: none;
  }
  .countdown .cd-label{
    display:block;
    font-family: 'Proxima Nova', sans-serif;
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 2px;
  }

  .vote-ticker{
    margin-top: 8px;
    text-align: center;
    font-size: 13px;
    color: var(--dim);
    letter-spacing: 0.04em;
    display: none;
  }
  .vote-ticker strong{ color: var(--white); }

  .confetti-piece{
    position: fixed;
    top: -20px;
    width: 8px;
    height: 14px;
    z-index: 999;
    pointer-events: none;
    animation-name: confetti-fall;
    animation-timing-function: cubic-bezier(0.4, 0.1, 0.6, 0.9);
    animation-iteration-count: 1;
  }
  @keyframes confetti-fall{
    0%{ transform: translateY(0) rotate(0deg); opacity: 1; }
    100%{ transform: translateY(105vh) rotate(540deg); opacity: 0.9; }
  }
  @media (prefers-reduced-motion: reduce){
    .confetti-piece{ animation: none; display: none; }
  }

  /* ---------- ROUTE ---------- */
  .route{
    max-width: 620px;
    margin: 48px auto 0;
    padding: 0 24px;
    position: relative;
    z-index: 1;
  }

  .stop{
    position: relative;
    display: grid;
    grid-template-columns: 64px 1fr;
    gap: 18px;
    padding-bottom: 6px;
  }

  .marker-col{
    position: relative;
    display:flex;
    justify-content:center;
  }
  .marker-col::before{
    content:"";
    position:absolute;
    top: 34px;
    bottom: -6px;
    width: 2px;
    background-image: repeating-linear-gradient(
      to bottom,
      var(--dim) 0px, var(--dim) 5px,
      transparent 5px, transparent 11px
    );
    left: 50%;
    transform: translateX(-50%);
    opacity: 0.45;
  }
  .stop:last-child .marker-col::before{ display:none; }

  .dot{
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--bg-card);
    border: 3px solid var(--dim);
    display:flex; align-items:center; justify-content:center;
    font-family:'Proxima Nova', sans-serif;
    font-weight:900;
    font-size: 15px;
    color: var(--white);
    z-index: 2;
    flex-shrink: 0;
  }
  .stop.active .dot{
    border-color: var(--blue);
    background: var(--blue);
    color: var(--white);
    box-shadow: 0 0 0 6px rgba(0,168,216,0.25), 0 0 14px var(--blue-glow);
  }
  .stop.done .dot{
    border-color: var(--dim);
    background: transparent;
    color: var(--dim);
  }
  .stop.drive-only .dot{
    width: 14px; height:14px;
    border-width: 2px;
    background: transparent;
  }

  .card{
    background: var(--bg-card);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 12px;
    padding: 16px 18px;
    margin-bottom: 22px;
    box-shadow: 0 6px 16px var(--shadow);
    transition: border-color .2s ease, transform .2s ease;
  }
  .stop.active .card{
    border-color: var(--blue);
    box-shadow: 0 6px 16px var(--shadow), 0 0 18px rgba(0,168,216,0.25);
    transform: translateX(2px);
  }
  .stop.drive-only{ padding-bottom: 0; }
  .stop.drive-only .card{
    background: transparent;
    border: none;
    box-shadow: none;
    padding: 4px 0 10px 2px;
    margin-bottom: 8px;
    font-style: italic;
    font-weight: 500;
    color: var(--dim);
    font-size: 14px;
  }

  .time-row{
    display:flex;
    align-items:baseline;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .time{
    font-weight: 600;
    font-size: 15px;
    color: var(--white);
    letter-spacing: 0.02em;
  }
  .stop.active .time{ color: var(--white); text-shadow: 0 0 8px var(--blue-glow); }

  .theme-badge{
    font-family: 'Proxima Nova', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--white);
    background: var(--blue);
    padding: 3px 12px;
    border-radius: 20px;
    white-space: nowrap;
  }

  .campus{
    font-family:'Proxima Nova', sans-serif;
    font-weight: 900;
    font-size: 25px;
    letter-spacing: 0.01em;
    margin: 6px 0 4px;
  }

  .addr{
    font-size: 14px;
    color: var(--dim);
    text-decoration: none;
    display:inline-flex;
    align-items:center;
    gap: 6px;
    border-bottom: 1px dotted rgba(169,175,196,0.5);
  }
  .addr:hover{ color: var(--white); border-color: var(--blue); }

  .now-badge{
    display:inline-block;
    margin-left: 10px;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--white);
    background: var(--blue);
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 700;
    vertical-align: middle;
  }

  /* ---------- SURVEY ---------- */
  .survey{
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px dashed rgba(255,255,255,0.22);
  }
  .survey-title{
    font-family:'Proxima Nova', sans-serif;
    font-weight: 900;
    font-size: 16px;
    letter-spacing: 0.03em;
    color: var(--white);
    margin-bottom: 10px;
  }
  .cat-row{
    display:flex;
    align-items:center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .cat-label{
    font-size: 14px;
    color: var(--dim);
    min-width: 110px;
  }
  .scale{
    display:flex;
    gap: 6px;
  }
  .scale button{
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.25);
    background: transparent;
    color: var(--dim);
    font-family: 'Proxima Nova', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: all .15s ease;
  }
  .scale button:hover{ border-color: var(--blue); color: var(--white); }
  .scale button.selected{
    background: var(--blue);
    border-color: var(--blue);
    color: var(--white);
    box-shadow: 0 0 10px var(--blue-glow);
  }
  .submit-btn{
    width: 100%;
    margin-top: 6px;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: var(--blue);
    color: var(--white);
    font-family: 'Proxima Nova', sans-serif;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity .15s ease;
  }
  .submit-btn:disabled{
    background: rgba(255,255,255,0.12);
    color: var(--dim);
    cursor: not-allowed;
  }
  .survey-error{
    text-align:center;
    color: #FF5A5A;
    font-size: 13px;
    margin-top: 6px;
  }
  .voter-note{
    font-size: 13px;
    color: var(--dim);
    font-style: italic;
    margin-bottom: 10px;
  }

  .name-row{
    display:flex;
    flex-direction: column;
    gap: 4px;
    margin-bottom: 12px;
  }
  .name-label{
    font-size: 13px;
    color: var(--dim);
    letter-spacing: 0.02em;
  }
  .name-input{
    padding: 8px 10px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.05);
    color: var(--white);
    font-family: 'Proxima Nova', sans-serif;
    font-size: 15px;
  }
  .name-input:focus{ outline: none; border-color: var(--blue); }
  .name-input::placeholder{ color: rgba(228,230,240,0.4); }
  .name-note{
    font-size: 12px;
    color: var(--dim);
    font-style: italic;
    margin-top: 2px;
  }

  .survey-recap{ text-align:center; }
  .survey-recap-scores{
    font-weight: 600;
    color: var(--white);
    font-size: 15px;
    padding: 6px 0;
  }
  .edit-btn{
    display:block;
    margin: 6px auto 0;
    padding: 8px 18px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.25);
    background: transparent;
    color: var(--dim);
    font-family: 'Proxima Nova', sans-serif;
    font-size: 13px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
  }
  .edit-btn:hover{ color: var(--white); border-color: var(--blue); }
  .survey-locked-note{
    text-align:center;
    color: var(--dim);
    font-size: 14px;
    font-style: italic;
    padding: 6px 0;
  }

  .lb-voters-toggle{
    display:block;
    width:100%;
    text-align:left;
    margin: -4px 0 8px;
    padding: 0;
    border: none;
    background: transparent;
    color: var(--dim);
    font-family: 'Proxima Nova', sans-serif;
    font-size: 12px;
    letter-spacing: 0.03em;
    cursor: pointer;
  }
  .lb-voters-toggle:hover{ color: var(--white); }
  .lb-voters{
    margin: 0 0 12px;
    padding: 8px 10px;
    background: rgba(255,255,255,0.04);
    border-radius: 8px;
  }
  .lb-voter-row{
    display:flex;
    justify-content: space-between;
    font-size: 13px;
    color: var(--dim);
    padding: 3px 0;
  }

  /* ---------- VOTING HELPER ---------- */
  .voting-helper{
    max-width: 620px;
    margin: 16px auto 0;
    padding: 16px 20px;
    background: var(--bg-card);
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.14);
    position: relative;
    z-index: 1;
  }
  .voting-helper-title{
    font-family: 'Proxima Nova', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 10px;
    text-align: center;
  }
  .voting-helper-list{
    display: flex;
    flex-direction: column;
    gap: 5px;
    font-size: 14px;
    color: var(--dim);
  }
  .voting-helper-list strong{
    color: var(--white);
    min-width: 16px;
    display: inline-block;
    margin-right: 6px;
  }

  /* ---------- LEADERBOARD ---------- */
  .leaderboard{
    max-width: 620px;
    margin: 20px auto 0;
    padding: 0 24px;
    position: relative;
    z-index: 1;
  }
  .lb-card{
    background: var(--bg-card);
    border: 2px solid var(--blue);
    border-radius: 14px;
    padding: 22px 20px;
    box-shadow: 0 8px 24px var(--shadow), 0 0 24px rgba(0,168,216,0.2);
  }
  .lb-title{
    font-family:'Proxima Nova', sans-serif;
    font-weight: 900;
    font-size: 28px;
    letter-spacing: 0.02em;
    text-align: center;
    margin: 0 0 4px;
  }
  .lb-sub{
    text-align:center;
    color: var(--dim);
    font-size: 14px;
    margin: 0 0 20px;
  }
  .lb-row{
    display:flex;
    align-items:center;
    gap: 14px;
    padding: 12px 0;
    border-bottom: 1px solid rgba(255,255,255,0.14);
  }
  .lb-row:last-child{ border-bottom: none; }
  .lb-row.first{
    background: linear-gradient(90deg, rgba(255,186,12,0.22), rgba(255,186,12,0.06));
    box-shadow: inset 0 0 0 1px rgba(255,186,12,0.45);
    border-radius: 10px;
    margin: 0 -20px;
    padding: 12px 20px;
    border-bottom: none;
  }
  .lb-rank{
    font-family:'Proxima Nova', sans-serif;
    font-weight: 900;
    font-size: 22px;
    color: var(--dim);
    width: 28px;
    text-align:center;
    flex-shrink: 0;
  }
  .lb-row.first .lb-rank{ color: var(--gold); font-size: 28px; text-shadow: 0 0 10px rgba(255,186,12,0.6); }
  .lb-info{ flex: 1; min-width:0; }
  .lb-campus{
    font-family:'Proxima Nova', sans-serif;
    font-weight: 900;
    font-size: 18px;
    letter-spacing: 0.01em;
  }
  .lb-theme{
    font-size: 13px;
    color: var(--dim);
    font-style: italic;
  }
  .lb-score{
    text-align:right;
    flex-shrink: 0;
  }
  .lb-total{
    font-family:'Proxima Nova', sans-serif;
    font-weight: 900;
    font-size: 22px;
    color: var(--white);
    text-shadow: 0 0 8px var(--blue-glow);
  }
  .lb-count{
    font-size: 12px;
    color: var(--dim);
  }
  .lb-refresh{
    display:block;
    margin: 18px auto 0;
    padding: 8px 18px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.25);
    background: transparent;
    color: var(--dim);
    font-family: 'Proxima Nova', sans-serif;
    font-size: 13px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
  }
  .lb-refresh:hover{ color: var(--white); border-color: var(--blue); }

  footer{
    text-align:center;
    color: var(--dim);
    font-size: 13px;
    margin-top: 40px;
    letter-spacing: 0.04em;
    position: relative;
    z-index: 1;
  }

  @media (max-width: 420px){
    .campus{ font-size: 21px; }
    .card{ padding: 14px; }
    .cat-label{ min-width: 100%; }
  }
</style>
</head>
<body>

  <div class="hero">
    <p class="eyebrow">Generosity and Experience — Team Day</p>
    <div class="atm-logo-wrap">
      <img class="atm-logo" src="https://cms-images.life.church/lc-site/pages/atm/2026/atm26_SST-Foreground-Image-Web.png?auto=format,compress&amp;fm=webp&amp;w=1000&amp;q=80" alt="At the Movies">
    </div>
    <h1 class="hero-subtitle">Tulsa Tour</h1>
    <p class="hero-date" id="heroDate"></p>
    <p class="hero-footnote">Tap any address to route there.</p>
  </div>

  <div class="day-banner">
    <div class="status" id="statusBar">Loading today's status…</div>
    <div class="countdown" id="countdownEl"></div>
    <div class="vote-ticker" id="voteTicker"></div>
  </div>

  <div class="voting-helper">
    <div class="voting-helper-title">Rating Scale</div>
    <div class="voting-helper-list">
      <div><strong>6</strong> Outstanding</div>
      <div><strong>5</strong> Extremely Effective</div>
      <div><strong>4</strong> Effective</div>
      <div><strong>3</strong> Somewhat Effective</div>
      <div><strong>2</strong> Somewhat Ineffective</div>
      <div><strong>1</strong> Ineffective</div>
    </div>
  </div>

  <div class="route" id="route"></div>

  <div class="leaderboard" id="leaderboardWrap"></div>

  <footer>ATM Tulsa Tour · 2026</footer>

<script>
const CATEGORIES = [
  { key: "overall", label: "Overall Excellence" },
  { key: "immersion", label: "Immersion" },
  { key: "theme", label: "Theme" }
];

async function fetchAgenda(){
  const res = await fetch("/api/agenda");
  if(!res.ok) throw new Error("bad response");
  const data = await res.json();
  return data.stops || [];
}

const TOUR_DATE = { year: 2026, month: 7, day: 22 }; // Wednesday, July 22, 2026
const RESULTS_UNLOCK = new Date(2026, 6, 22, 15, 15, 0); // 3:15 PM, end of final build stop

function parseStartMinutes(str){
  const m = str.match(/(\d{1,2}):(\d{2})\s*(AM|PM)?/i);
  if(!m) return null;
  let h = parseInt(m[1],10);
  const min = parseInt(m[2],10);
  const ap = (m[3]||"").toUpperCase();
  if(ap === "PM" && h !== 12) h += 12;
  if(ap === "AM" && h === 12) h = 0;
  return h*60+min;
}
function parseEndMinutes(str){
  const parts = str.split(/[–-]/);
  if(parts.length < 2) return parseStartMinutes(str);
  return parseStartMinutes(parts[1].trim() || parts[0].trim());
}

// ---------- PREVIEW MODE ----------
// ?previewAt=2026-07-22T10:30:00 simulates the clock for testing the live
// active-stop marker and the post-unlock leaderboard, without waiting for
// the real day/time. The whole app runs on this shifted clock when present.
let previewOffsetMs = 0;
let isPreview = false;
try{
  const previewAt = new URLSearchParams(location.search).get("previewAt");
  if(previewAt){
    const parsed = new Date(previewAt);
    if(!isNaN(parsed.getTime())){
      previewOffsetMs = parsed.getTime() - Date.now();
      isPreview = true;
    }
  }
}catch(e){}
function virtualNow(){ return new Date(Date.now() + previewOffsetMs); }

const now = virtualNow();
const isTourDay = now.getFullYear() === TOUR_DATE.year &&
                   (now.getMonth()+1) === TOUR_DATE.month &&
                   now.getDate() === TOUR_DATE.day;
const nowMin = now.getHours()*60 + now.getMinutes();
const resultsUnlocked = now >= RESULTS_UNLOCK;

const statusBar = document.getElementById("statusBar");
const tourDateLabel = "Wednesday, July 22";
const routeEl = document.getElementById("route");

const heroDateEl = document.getElementById("heroDate");
if(heroDateEl) heroDateEl.textContent = `${tourDateLabel}, ${TOUR_DATE.year}`;

if(isPreview){
  const banner = document.createElement("div");
  banner.className = "preview-banner";
  banner.textContent = `🔧 Preview mode — simulating ${now.toLocaleString()}`;
  document.body.insertBefore(banner, document.body.firstChild);
}

// ---------- COUNTDOWN ----------
const countdownEl = document.getElementById("countdownEl");
function updateCountdown(){
  const diff = RESULTS_UNLOCK.getTime() - virtualNow().getTime();
  if(diff <= 0){
    countdownEl.style.display = "none";
    return;
  }
  countdownEl.style.display = "block";
  const totalSec = Math.floor(diff / 1000);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  const pad = n => String(n).padStart(2, "0");
  countdownEl.innerHTML = `<span class="cd-label">Results unlock in</span>${pad(h)}:${pad(m)}:${pad(s)}`;
}
updateCountdown();
setInterval(updateCountdown, 1000);

const PLACEHOLDER_NAMES = [
  "Aladdin", "Princess Jasmine", "Buzz Lightyear", "Woody", "Snow White",
  "Prince Charming", "Cinderella", "Simba", "Nala", "Ariel",
  "Belle", "Mulan", "Moana", "Elsa", "Anna",
  "Rapunzel", "Flynn Rider", "Tiana", "Peter Pan", "Wendy Darling",
  "Nemo", "Dory", "Mike Wazowski", "Sulley", "Remy",
  "WALL-E", "Eve", "Merida", "Hercules", "Pocahontas"
];
function randomPlaceholderName(){
  return PLACEHOLDER_NAMES[Math.floor(Math.random() * PLACEHOLDER_NAMES.length)];
}
function getVoterName(){
  try{
    let name = localStorage.getItem("voterName");
    if(!name){
      name = randomPlaceholderName();
      localStorage.setItem("voterName", name);
    }
    return name;
  }catch(e){
    return randomPlaceholderName();
  }
}
function setVoterName(name){
  try{ if(name) localStorage.setItem("voterName", name); }catch(e){}
}
function hasAnyPriorSubmission(){
  try{
    for(let i=0;i<localStorage.length;i++){
      if(localStorage.key(i).startsWith("submission:")) return true;
    }
  }catch(e){}
  return false;
}
function getSubmission(campusId){
  try{
    const raw = localStorage.getItem(`submission:${campusId}`);
    return raw ? JSON.parse(raw) : null;
  }catch(e){ return null; }
}
function setSubmission(campusId, data){
  try{ localStorage.setItem(`submission:${campusId}`, JSON.stringify(data)); }catch(e){}
}
function getSessionId(){
  try{
    let id = localStorage.getItem("sessionId");
    if(!id){
      id = crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(36).slice(2)}`;
      localStorage.setItem("sessionId", id);
    }
    return id;
  }catch(e){ return null; }
}

let refreshAll = async function(){};

// Name rows currently shown on not-yet-submitted forms, waiting on this
// browser's first-ever vote. Cleared out the moment any of them submits,
// so name only ever has to be entered once per browser.
const nameRowsAwaitingFirstVote = [];

function renderSurvey(campusId, campusLabel, theme){
  const wrap = document.createElement("div");
  wrap.className = "survey";
  wrap.innerHTML = `
    <div class="survey-title">Rate this build</div>
    <div class="voter-note" id="voter-note-${campusId}" style="display:none"></div>
    <div class="survey-body"></div>
  `;
  const body = wrap.querySelector(".survey-body");

  function renderForm(existing){
    body.innerHTML = "";
    const selections = {
      overall: existing ? existing.overall : undefined,
      immersion: existing ? existing.immersion : undefined,
      theme: existing ? existing.theme : undefined
    };

    const showNameField = !existing && !hasAnyPriorSubmission();
    let nameInput = null;
    let nameRowEl = null;
    if(showNameField){
      nameRowEl = document.createElement("div");
      nameRowEl.className = "name-row";
      const nameLabel = document.createElement("label");
      nameLabel.className = "name-label";
      nameLabel.textContent = "Your name";
      nameInput = document.createElement("input");
      nameInput.type = "text";
      nameInput.className = "name-input";
      nameInput.maxLength = 60;
      nameInput.value = getVoterName();
      const nameNote = document.createElement("div");
      nameNote.className = "name-note";
      nameNote.textContent = "This name will be used for all your other votes too — you only need to enter it once.";
      nameRowEl.appendChild(nameLabel);
      nameRowEl.appendChild(nameInput);
      nameRowEl.appendChild(nameNote);
      body.appendChild(nameRowEl);
      nameRowsAwaitingFirstVote.push(nameRowEl);
    }

    CATEGORIES.forEach(cat => {
      const row = document.createElement("div");
      row.className = "cat-row";
      row.innerHTML = `<span class="cat-label">${cat.label}</span>`;
      const scale = document.createElement("div");
      scale.className = "scale";
      for(let i=1;i<=6;i++){
        const btn = document.createElement("button");
        btn.type = "button";
        btn.textContent = i;
        if(selections[cat.key] === i) btn.classList.add("selected");
        btn.addEventListener("click", () => {
          selections[cat.key] = i;
          scale.querySelectorAll("button").forEach(b => b.classList.remove("selected"));
          btn.classList.add("selected");
          updateSubmitState();
        });
        scale.appendChild(btn);
      }
      row.appendChild(scale);
      body.appendChild(row);
    });

    const submitBtn = document.createElement("button");
    submitBtn.className = "submit-btn";
    submitBtn.textContent = existing ? "Save changes" : "Submit rating";
    submitBtn.disabled = !CATEGORIES.every(c => selections[c.key] !== undefined);
    submitBtn.addEventListener("click", async () => {
      submitBtn.disabled = true;
      submitBtn.textContent = existing ? "Saving…" : "Submitting…";
      const name = nameInput ? (nameInput.value.trim() || getVoterName()) : getVoterName();
      try{
        const res = await fetch("/api/rate", {
          method: existing ? "PATCH" : "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            campusId,
            pageId: existing ? existing.pageId : undefined,
            overall: selections.overall,
            immersion: selections.immersion,
            theme: selections.theme,
            name,
            sessionId: getSessionId()
          })
        });
        if(!res.ok) throw new Error("request failed");
        const data = await res.json();
        setVoterName(name);
        setSubmission(campusId, {
          pageId: existing ? existing.pageId : data.id,
          overall: selections.overall,
          immersion: selections.immersion,
          theme: selections.theme,
          name
        });
        if(nameRowEl){
          nameRowsAwaitingFirstVote.forEach(el => { el.style.display = "none"; });
          nameRowsAwaitingFirstVote.length = 0;
        }
        renderRecap();
        refreshAll();
      }catch(err){
        submitBtn.disabled = false;
        submitBtn.textContent = existing ? "Save changes" : "Submit rating";
        const errEl = document.createElement("div");
        errEl.className = "survey-error";
        errEl.textContent = "Couldn't save that — check your connection and try again.";
        body.appendChild(errEl);
      }
    });
    body.appendChild(submitBtn);

    function updateSubmitState(){
      const allSet = CATEGORIES.every(c => selections[c.key] !== undefined);
      submitBtn.disabled = !allSet;
    }
  }

  function renderRecap(){
    const existing = getSubmission(campusId);
    body.innerHTML = "";
    const recap = document.createElement("div");
    recap.className = "survey-recap";
    const scoreLine = document.createElement("div");
    scoreLine.className = "survey-recap-scores";
    scoreLine.textContent = `${existing.name || "You"} rated ${campusLabel} — Overall ${existing.overall} · Immersion ${existing.immersion} · Theme ${existing.theme}`;
    recap.appendChild(scoreLine);
    body.appendChild(recap);

    if(resultsUnlocked){
      const lockNote = document.createElement("div");
      lockNote.className = "survey-locked-note";
      lockNote.textContent = "Ratings are locked — results are in!";
      body.appendChild(lockNote);
    } else {
      const editBtn = document.createElement("button");
      editBtn.className = "edit-btn";
      editBtn.textContent = "Edit rating";
      editBtn.addEventListener("click", () => renderForm(existing));
      body.appendChild(editBtn);
    }
  }

  const existing = getSubmission(campusId);
  if(existing){
    renderRecap();
  } else if(resultsUnlocked){
    body.innerHTML = `<div class="survey-locked-note">Ratings are now locked — results are in!</div>`;
  } else {
    renderForm(null);
  }

  return wrap;
}

// ---------- LEADERBOARD / VOTE TICKER SHARED PIECES ----------
const lbWrap = document.getElementById("leaderboardWrap");
const voteTickerEl = document.getElementById("voteTicker");

let confettiFired = false;
function launchConfetti(){
  if(window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
  const colors = ["#00A8D8", "#FFFFFF", "#8FE3FF"];
  const count = 60;
  for(let i = 0; i < count; i++){
    const piece = document.createElement("div");
    piece.className = "confetti-piece";
    piece.style.left = Math.random() * 100 + "vw";
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDuration = (2.2 + Math.random() * 1.4) + "s";
    piece.style.animationDelay = (Math.random() * 0.4) + "s";
    piece.style.opacity = String(0.7 + Math.random() * 0.3);
    document.body.appendChild(piece);
    setTimeout(() => piece.remove(), 4200);
  }
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, ch => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[ch]));
}

async function fetchTotals(){
  try{
    const res = await fetch("/api/leaderboard");
    if(!res.ok) throw new Error("bad response");
    const data = await res.json();
    return data.totals || {};
  }catch(e){
    return null;
  }
}

function renderVoteTicker(totals){
  if(!totals){ voteTickerEl.style.display = "none"; return; }
  const totalVotes = Object.values(totals).reduce((sum, c) => sum + c.count, 0);
  voteTickerEl.style.display = "block";
  voteTickerEl.innerHTML = totalVotes > 0
    ? `<strong>${totalVotes}</strong> rating${totalVotes===1?"":"s"} submitted so far today`
    : `No ratings submitted yet — be the first!`;
}

// ---------- INIT: fetch agenda from Notion, then render everything that depends on it ----------
async function init(){
  let stops;
  try{
    stops = await fetchAgenda();
  }catch(e){
    statusBar.textContent = "Couldn't load the agenda — check your connection and refresh.";
    return;
  }

  const pointStops = stops.filter(s => s.type === "point");
  let activeIndex = -1;
  let nextIndex = -1;

  if(isTourDay){
    for(let i=0;i<pointStops.length;i++){
      const s = pointStops[i].time;
      const start = parseStartMinutes(s);
      const end = parseEndMinutes(s);
      if(start!==null && end!==null && nowMin >= start && nowMin <= end){
        activeIndex = i;
        break;
      }
    }
    if(activeIndex === -1){
      for(let i=0;i<pointStops.length;i++){
        const start = parseStartMinutes(pointStops[i].time);
        if(start!==null && nowMin < start){ nextIndex = i; break; }
      }
    }
  }

  // Once every stop's start time has passed (e.g. after the single-point-in-time
  // "Drive back to Central!" stop), nothing matches the active-window or next-stop
  // checks above. Treat the last stop as the active one so the timeline still
  // reflects "here's where the day stands" — but only for a couple hours after
  // the tour ends; by 5 PM everyone should be home, so drop the highlight.
  const DRIVE_HOME_ACTIVE_CUTOFF_MIN = 17 * 60; // 5:00 PM
  let displayActiveIndex = activeIndex;
  if(isTourDay && displayActiveIndex === -1 && nextIndex === -1 && pointStops.length && nowMin < DRIVE_HOME_ACTIVE_CUTOFF_MIN){
    displayActiveIndex = pointStops.length - 1;
  }

  if(resultsUnlocked){
    statusBar.innerHTML = `<strong>Results are in</strong> — see the leaderboard below`;
  } else if(!isTourDay){
    const todayIsBefore = now < new Date(TOUR_DATE.year, TOUR_DATE.month - 1, TOUR_DATE.day);
    statusBar.innerHTML = todayIsBefore
      ? `Tour day is <strong>${tourDateLabel}</strong> — live status will show up here that morning`
      : `The <strong>${tourDateLabel}</strong> tour has passed — hope it was a great day!`;
  } else if(activeIndex !== -1){
    statusBar.innerHTML = `You're at <strong>${pointStops[activeIndex].label}</strong> right now`;
  } else if(nextIndex !== -1){
    statusBar.innerHTML = `Next up: <strong>${pointStops[nextIndex].label}</strong> at ${pointStops[nextIndex].time}`;
  } else if(pointStops.length && nowMin > parseStartMinutes(pointStops[pointStops.length-1].time)){
    statusBar.innerHTML = `Tour's wrapped for the day — <strong>safe travels home!</strong>`;
  } else {
    statusBar.innerHTML = `<strong>Tour day</strong> — check back once you're on the road`;
  }

  let pointCounter = 0;
  stops.forEach((s) => {
   try {
    const div = document.createElement("div");

    if(s.type === "drive"){
      div.className = "stop drive-only";
      div.innerHTML = `
        <div class="marker-col"><div class="dot"></div></div>
        <div class="card">${s.label}</div>
      `;
      routeEl.appendChild(div);
      return;
    }

    pointCounter++;
    const idxAmongPoints = pointCounter - 1;
    const isActive = idxAmongPoints === displayActiveIndex;
    const isDone = displayActiveIndex !== -1 ? idxAmongPoints < displayActiveIndex : (nextIndex !== -1 && idxAmongPoints < nextIndex);

    div.className = "stop" + (isActive ? " active" : "") + (isDone ? " done" : "");

    const mapsUrl = s.address ? `https://maps.apple.com/?q=${encodeURIComponent(s.address)}` : null;

    div.innerHTML = `
      <div class="marker-col"><div class="dot">${pointCounter}</div></div>
      <div class="card">
        <div class="time-row">
          <span class="time">${s.time}${isActive ? '<span class="now-badge">Now</span>' : ''}</span>
          ${s.theme ? `<span class="theme-badge">${s.theme}</span>` : ''}
        </div>
        <div class="campus">${s.label}</div>
        ${s.sublabel ? `<div style="color:var(--dim);font-size:13px;margin-bottom:6px;">${s.sublabel}</div>` : ''}
        ${mapsUrl ? `<a class="addr" href="${mapsUrl}" target="_blank" rel="noopener">📍 ${s.address}</a>` : ''}
      </div>
    `;

    if(s.campusId){
      div.querySelector(".card").appendChild(renderSurvey(s.campusId, s.label, s.theme));
    }

    routeEl.appendChild(div);
   } catch(err){
     console.error("Failed to render a stop:", err);
   }
  });

  const CAMPUSES = stops.filter(s => s.campusId).map(s => ({ id: s.campusId, label: s.label, theme: s.theme }));

  function renderVoterNotes(totals){
    CAMPUSES.forEach(c => {
      const el = document.getElementById(`voter-note-${c.id}`);
      if(!el) return;
      const t = totals && totals[c.id];
      if(!t || t.count === 0){ el.style.display = "none"; el.textContent = ""; return; }
      const names = t.voters.map(v => v.name).filter(Boolean);
      const shown = names.slice(0, 3);
      const extra = t.count - shown.length;
      let text = `🗳️ ${t.count} vote${t.count===1?"":"s"}`;
      if(shown.length) text += ` — ${shown.join(", ")}`;
      if(extra > 0) text += ` +${extra} more`;
      el.textContent = text;
      el.style.display = "block";
    });
  }

  function buildResults(totals){
    return CAMPUSES.map(c => {
      const t = (totals && totals[c.id]) || { total: 0, count: 0, voters: [] };
      return { ...c, total: t.total, count: t.count, average: t.count > 0 ? t.total / (t.count * 3) : 0, voters: t.voters || [] };
    }).sort((a,b) => b.average - a.average);
  }

  function renderLeaderboard(totals){
    if(!resultsUnlocked){
      lbWrap.innerHTML = "";
      return;
    }
    if(!totals){
      lbWrap.innerHTML = `
        <div class="lb-card">
          <div class="lb-title">🏆 Final Results</div>
          <div class="lb-sub">Couldn't load results right now — check your connection and refresh.</div>
        </div>
      `;
      return;
    }
    const results = buildResults(totals);
    const rows = results.map((r, i) => {
      const voterRows = r.voters.map(v => `
        <div class="lb-voter-row">
          <span>${escapeHtml(v.name || "Anonymous")}</span>
          <span>${v.overall}/${v.immersion}/${v.theme}</span>
        </div>
      `).join("");
      return `
        <div class="lb-row${i===0 ? ' first' : ''}">
          <div class="lb-rank">${i+1}</div>
          <div class="lb-info">
            <div class="lb-campus">${r.label}</div>
            <div class="lb-theme">${r.theme || ""}</div>
          </div>
          <div class="lb-score">
            <div class="lb-total">${r.count > 0 ? r.average.toFixed(1) : "—"}</div>
            <div class="lb-count">${r.count} rating${r.count===1?"":"s"}</div>
          </div>
        </div>
        ${r.voters.length ? `
          <button class="lb-voters-toggle" data-target="lb-voters-${r.id}">Who voted, and how ▾</button>
          <div class="lb-voters" id="lb-voters-${r.id}" style="display:none">${voterRows}</div>
        ` : ""}
      `;
    }).join("");

    lbWrap.innerHTML = `
      <div class="lb-card">
        <div class="lb-title">🏆 Final Results</div>
        <div class="lb-sub">Ranked by average score across Overall Excellence, Immersion &amp; Theme</div>
        ${rows}
        <button class="lb-refresh" id="lbRefreshBtn">Refresh results</button>
      </div>
    `;
    if(!confettiFired && results.length && results[0].count > 0){
      confettiFired = true;
      launchConfetti();
    }
    document.getElementById("lbRefreshBtn").addEventListener("click", async () => {
      const freshTotals = await refreshAll();
      const freshResults = buildResults(freshTotals);
      if(freshResults.length && freshResults[0].count > 0){
        launchConfetti();
      }
    });
    lbWrap.querySelectorAll(".lb-voters-toggle").forEach(btn => {
      btn.addEventListener("click", () => {
        const target = document.getElementById(btn.dataset.target);
        if(!target) return;
        const isHidden = target.style.display === "none";
        target.style.display = isHidden ? "block" : "none";
        btn.textContent = isHidden ? "Who voted, and how ▲" : "Who voted, and how ▾";
      });
    });
  }

  refreshAll = async function(){
    const totals = await fetchTotals();
    renderVoteTicker(totals);
    renderVoterNotes(totals);
    renderLeaderboard(totals);
    return totals;
  };
  refreshAll();
  setInterval(refreshAll, 20000);
}

init();
</script>
